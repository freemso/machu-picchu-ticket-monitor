[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "mp-monitor check"
# DISABLED: Railway's egress IP got durably WAF-banned, so monitoring moved to GitHub
# Actions (.github/workflows/monitor.yml), which fans out across fresh runner IPs. This
# yearly schedule effectively pauses the Railway cron; you can also delete the Railway
# service to stop it entirely. To re-enable, restore a real schedule like "0 * * * *".
cronSchedule = "0 0 1 1 *"
restartPolicyType = "NEVER"

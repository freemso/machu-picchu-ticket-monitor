[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "mp-monitor check"
# Hourly. Each run drips its requests ~3 min apart (INTER_REQUEST_DELAY_SECONDS) to
# stay under the WAF's per-IP burst limit on Railway's fixed egress IP. The run is
# long but mostly idle, which is cheap on Railway's usage-based billing.
cronSchedule = "0 * * * *"
restartPolicyType = "NEVER"

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Machu Picchu Availability Monitor</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9; --text: #17202a; --muted: #667085; --line: #d9dee7;
        --panel: #fff; --accent-dark: #115e59; --gold: #b7791f; --warn: #b42318;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      header { background: #17202a; color: #fff; padding: 22px clamp(18px, 4vw, 42px); }
      header h1 { margin: 0 0 6px; font-size: clamp(1.3rem, 2vw, 1.9rem); }
      header p { margin: 0; color: #cbd5e1; font-size: .9rem; }
      main { width: min(900px, calc(100vw - 28px)); margin: 22px auto 44px; }
      .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; margin-top: 16px; overflow: hidden; }
      .panel-head { display: flex; align-items: baseline; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--line); }
      h2 { margin: 0; font-size: 1rem; }
      .muted { color: var(--muted); font-size: .82rem; }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 11px 16px; border-bottom: 1px solid var(--line); text-align: left; font-size: .9rem; }
      th { color: #475467; background: #f9fafb; font-weight: 700; }
      td span { display: block; color: var(--muted); margin-top: 3px; font-size: .8rem; }
      .qty { font-weight: 800; font-variant-numeric: tabular-nums; }
      .qty.has { color: var(--gold); }
      .qty.none { color: var(--muted); }
      .empty { color: var(--muted); text-align: center; padding: 26px; }
      .err { color: var(--warn); }
      footer { width: min(900px, calc(100vw - 28px)); margin: 0 auto 40px; color: var(--muted); font-size: .8rem; }
    </style>
  </head>
  <body>
    <header>
      <h1>Machu Picchu Availability Monitor</h1>
      <p>Online ticket availability, collected hourly by GitHub Actions.</p>
    </header>
    <main id="content"><p class="muted" style="padding:18px">Loading…</p></main>
    <footer id="footer"></footer>

    <script>
      const e = (s) => String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

      function render(data) {
        const routes = (data.routes || []).slice().sort((a, b) =>
          (a.visit_date + a.route).localeCompare(b.visit_date + b.route));
        const byDate = {};
        for (const r of routes) (byDate[r.visit_date] ||= []).push(r);

        const dates = Object.keys(byDate).sort();
        let html = "";
        if (!dates.length) {
          html = '<section class="panel"><p class="empty">No routes published yet.</p></section>';
        }
        for (const date of dates) {
          const weekday = new Date(date + "T00:00:00").toLocaleDateString(undefined, { weekday: "long" });
          const rows = byDate[date].map((r) => {
            const q = Number(r.availability || 0);
            const cls = q > 0 ? "has" : "none";
            return `<tr><td><strong>${e(r.route)}</strong><span>${e(r.route_name || "")}</span></td>
              <td class="qty ${cls}">${q}</td></tr>`;
          }).join("");
          html += `<section class="panel">
            <div class="panel-head"><h2>${e(date)}</h2><span class="muted">${e(weekday)}</span></div>
            <table><thead><tr><th>Route</th><th>Available online</th></tr></thead><tbody>${rows}</tbody></table>
          </section>`;
        }
        document.getElementById("content").innerHTML = html;
        const ts = data.generated_at ? new Date(data.generated_at).toLocaleString() : "unknown";
        document.getElementById("footer").textContent = `Last updated: ${ts} · refreshes every 60s`;
      }

      async function load() {
        try {
          const res = await fetch("./availability.json?t=" + Date.now(), { cache: "no-store" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          render(await res.json());
        } catch (err) {
          document.getElementById("footer").innerHTML = '<span class="err">Could not load data: ' + e(err) + "</span>";
        }
      }
      load();
      setInterval(load, 60000);
    </script>
  </body>
</html>

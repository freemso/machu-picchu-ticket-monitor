name: Monitor

# Hourly availability check on GitHub-hosted runners. The official API's WAF rate-limits
# per source IP and 403s a burst of requests, but GitHub gives each job a fresh runner IP.
# So we fan out: one job per rule (read from rules.json), each making just a couple of calls
# from its own IP. That gives full coverage every run without tripping the limit. Alerts are
# state-based ("alert while the condition holds"), so each job is stateless — no shared cache.
#
# Requires a PUBLIC repo for free Actions minutes (the fan-out multiplies billable jobs).

on:
  schedule:
    # Hourly at :17 — deliberately off the top of the hour. GitHub delays/drops scheduled
    # runs during the :00 stampede, so an odd minute fires far more reliably.
    - cron: "17 * * * *"
  workflow_dispatch: {}

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: gen
        # One matrix entry per rule; each carries that single rule as a JSON-array string
        # (passed to the check job via the ALERT_RULES env var).
        run: |
          matrix=$(jq -c '{include: [ .[] | {name: (.name // .route), rules: ([.] | tojson)} ]}' rules.json)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  check:
    needs: plan
    runs-on: ubuntu-latest
    # A single route whose runner IP gets a transient 403 shouldn't mark the whole run
    # red — the other routes still checked, and state-based alerts cover the missed route
    # next run. The failed route is still visible as a failed job in the run's job list.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    name: check (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install .
      - name: Check this rule
        env:
          ALERT_RULES: ${{ matrix.rules }} # just this one rule
          PROVIDER_MODE: auto
          PREFERRED_NOTIFICATION: telegram
          INTER_REQUEST_DELAY_SECONDS: "0" # one route per job — no intra-run burst to pace
          SQLITE_PATH: data/availability.sqlite3
          SNAPSHOT_OUT: snapshot.json # this route's result, for the dashboard snapshot
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: mp-monitor check
      - name: Upload this route's snapshot
        if: always() # publish whatever was fetched, even if another route 403'd
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-${{ strategy.job-index }}
          path: snapshot.json
          if-no-files-found: ignore

  publish:
    needs: check
    if: always() # publish whatever routes succeeded, even if some failed
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the merged snapshot to the data branch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: snapshot-*
      - name: Merge route snapshots
        run: |
          shopt -s nullglob
          files=(artifacts/*/snapshot.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo '{"generated_at":"","routes":[],"slots":[]}' > availability.json
          else
            jq -s '{
              generated_at: (now | todate),
              routes: (map(.routes) | add // []),
              slots:  (map(.slots)  | add // [])
            }' "${files[@]}" > availability.json
          fi
          cat availability.json
      - name: Publish to data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan data
          git reset
          git add -f availability.json
          git commit -m "snapshot $(date -u +%FT%TZ)"
          git push -f origin data

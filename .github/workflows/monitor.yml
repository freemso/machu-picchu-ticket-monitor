name: Monitor

# Hourly availability check on GitHub-hosted runners. The official API's WAF rate-limits
# per source IP and 403s a burst of requests, but GitHub gives each job a fresh runner IP.
# So we fan out: one job per rule (read from rules.json), each making just a couple of calls
# from its own IP. That gives full coverage every run without tripping the limit. Alerts are
# state-based ("alert while the condition holds"), so each job is stateless — no shared cache.
#
# Requires a PUBLIC repo for free Actions minutes (the fan-out multiplies billable jobs).

on:
  schedule:
    # Hourly at :17 — deliberately off the top of the hour. GitHub delays/drops scheduled
    # runs during the :00 stampede, so an odd minute fires far more reliably.
    - cron: "17 * * * *"
  workflow_dispatch: {}

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: gen
        # One matrix entry per rule; each carries that single rule as a JSON-array string
        # (passed to the check job via the ALERT_RULES env var).
        run: |
          matrix=$(jq -c '{include: [ .[] | {name: (.name // .route), rules: ([.] | tojson)} ]}' rules.json)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  check:
    needs: plan
    runs-on: ubuntu-latest
    # A single route whose runner IP gets a transient 403 shouldn't mark the whole run
    # red — the other routes still checked, and state-based alerts cover the missed route
    # next run. The failed route is still visible as a failed job in the run's job list.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    name: check (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install .
      - name: Check this rule
        env:
          ALERT_RULES: ${{ matrix.rules }} # just this one rule
          PROVIDER_MODE: auto
          PREFERRED_NOTIFICATION: telegram
          INTER_REQUEST_DELAY_SECONDS: "0" # one route per job — no intra-run burst to pace
          SQLITE_PATH: data/availability.sqlite3
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: mp-monitor check
